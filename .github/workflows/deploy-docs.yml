name: Generate and Deploy Docs

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'tgbotrs/src/**'
      - 'scripts/**'
      - '.github/workflows/deploy-docs.yml'

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      message:
        description: 'Deployment message (optional)'
        required: false
        default: 'Manual docs deployment'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    name: Generate and deploy docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install beautifulsoup4 lxml 2>/dev/null || true

      - name: Generate docs from source
        run: python3 scripts/generate_docs.py

      - name: Print generated file sizes
        run: |
          ls -lah site/
          du -sh site/*

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: |
            docs: auto-deploy from ${{ github.ref_name }}

            source: ${{ github.sha }}
            trigger: ${{ github.event_name }}
